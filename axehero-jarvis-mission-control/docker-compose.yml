services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    environment:
      APP_HOST: axehero-jarvis-mission-control_web_1
      APP_PORT: 8000
    networks:
      - umbrel_main_network

  web:
    image: docker.io/pasmer/axehero-jarvis-mission-control:0.1.0
    restart: unless-stopped
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR:-./data}:/data
    environment:
      HERMES_API_URL: http://hermes-agent_web_1:8642
      HERMES_API_KEY_FILE: /data/hermes_api_key
      HERMES_CONVERSATION: jarvis-mission-control
    networks:
      - umbrel_main_network

networks:
  umbrel_main_network:
    external: true
