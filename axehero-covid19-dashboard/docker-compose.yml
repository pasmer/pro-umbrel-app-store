version: "3.8"

services:
  app:
    image: pasmer/italy-dash-web:1.0.0
    container_name: italy-dash-web
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      - TZ=Europe/Rome
    networks:
      - umbrel_main_network

networks:
  umbrel_main_network:
    external: true
