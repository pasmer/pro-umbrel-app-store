version: "3.7"

services:
  app:
    image: rating-svm-web
    restart: on-failure
    stop_grace_period: 1m
    # Ports are managed by Umbrel via the 'port' field in umbrel-app.yml
    # but the container must expose it or we trust the internal network.
    # Typically we don't map ports here to avoid host conflicts.
    networks:
      default:
        ipv4_address: $APP_IP
